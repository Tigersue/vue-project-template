name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  quality:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  build:
    name: Build + Bundle size check
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Bundle size alert
        run: |
          TOTAL=$(find dist/assets -name "*.js" | xargs gzip -c | wc -c)
          LIMIT=$((500*1024))
          echo "Gzipped JS: ${TOTAL} bytes"
          [ "$TOTAL" -gt "$LIMIT" ] && echo "::warning::Bundle >500 kB gzipped"
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/, retention-days: 7 }
